services:
  # Backend Web Service
  - type: web
    name: portfolio-backend-tekeng
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Frontend Static Site
  - type: web
    name: portfolio-frontend-tekeng
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: portfolio-backend-tekeng
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
